<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduTrack — Exam & Result Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="page-login" class="auth-wrap">
  <div class="auth-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-mark">E</div>
      <h1>EduTrack</h1>
      <p>Exam &amp; Result Management System</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-input" placeholder="admin@beacon.edu.pk" value="admin@beacon.edu.pk" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="password" value="password" required />
      </div>
      <div id="login-error" class="alert-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      <p class="auth-hint">Demo: admin@beacon.edu.pk / password</p>
    </form>
  </div>
</div>

<div id="page-app" class="app-shell hidden">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">E</div>
      <div>
        <span class="brand-name">EduTrack</span>
        <span class="brand-sub">Result Management</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <a class="nav-link active" data-page="dashboard">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard</a>
      <a class="nav-link" data-page="students">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Students</a>
      <a class="nav-link" data-page="exams">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Exams</a>
      <a class="nav-link" data-page="marks">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Marks Entry</a>
      <a class="nav-link" data-page="results">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Results</a>
      <a class="nav-link" data-page="recheck">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Recheck</a>
      <a class="nav-link" data-page="reports">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div class="online-dot"></div>
      <div style="flex:1">
        <div id="sidebar-user-name" style="font-size:12px;color:var(--text2);font-weight:500">Staff</div>
        <div id="sidebar-user-role" style="font-size:10px;color:var(--text3)">Role</div>
      </div>
      <button id="logout-btn" class="icon-btn" title="Logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>
    <main class="page-content" id="page-content"></main>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/services/api.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/all_pages.js"></script>
<script src="js/app.js"></script>
</body>
</html>
